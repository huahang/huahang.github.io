name: Jekyll Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install rbenv and ruby-build
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/rbenv/rbenv.git "$HOME/.rbenv"
          git clone --depth 1 https://github.com/rbenv/ruby-build.git "$HOME/.rbenv/plugins/ruby-build"
          {
            echo "$HOME/.rbenv/bin"
            echo "$HOME/.rbenv/shims"
          } >> "$GITHUB_PATH"
          echo "RBENV_ROOT=$HOME/.rbenv" >> "$GITHUB_ENV"

      - name: Install Ruby via rbenv
        run: |
          set -euo pipefail
          ruby_version="$(cat .ruby-version)"
          rbenv install --skip-existing "$ruby_version"
          rbenv rehash
          rbenv version
          ruby --version

      - name: Install gems
        run: |
          set -euo pipefail
          gem install bundler --no-document
          rbenv rehash
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build with Jekyll
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Only deploy on pushes to master, not on pull requests.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4